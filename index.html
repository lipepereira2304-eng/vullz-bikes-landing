<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Catálogos Digitais | Vullz Bikes</title>
    <meta
      name="description"
      content="Catálogo digital da Vullz Bikes. Explore nossa linha completa de bicicletas e veículos elétricos com design, tecnologia e mobilidade."
    />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="canonical" href="https://vullzbikes.com.br/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vullz Bikes" />
    <meta property="og:title" content="Catálogos Digitais" />
    <meta
      property="og:description"
      content="Explore toda nossa linha de bicicletas e veículos elétricos."
    />
    <meta property="og:url" content="https://vullzbikes.com.br/" />
    <meta property="og:image" content="https://vullzbikes.com.br/og-image.png" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Catálogos Digitais" />
    <meta
      name="twitter:description"
      content="Explore toda nossa linha de bicicletas e veículos elétricos."
    />
    <meta name="twitter:image" content="https://vullzbikes.com.br/og-image.png" />

    <!--
      Favicons / PWA. O ?v= existe porque navegador e iOS cacheiam favicon de
      forma muito agressiva e costumam ignorar os headers do servidor: sem mudar
      a URL, quem já visitou continua vendo o ícone antigo. Suba o número sempre
      que trocar a arte do ícone.

      O /favicon.ico não é decorativo nem legado: os <link> abaixo só valem para
      páginas HTML. Ao abrir o PDF do catálogo (/catalogos/*.pdf) não existe
      <head> nenhum para o navegador ler, então ele busca /favicon.ico na raiz
      do domínio por conta própria — sem esse arquivo, a aba do catálogo fica
      sem o ícone da marca. Por isso ele fica sem ?v=: o navegador pede essa URL
      exata, sem query.
    -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/scripts/main.ts"></script>
  </body>
</html>
